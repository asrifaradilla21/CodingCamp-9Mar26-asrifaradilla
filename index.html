<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Greeting Display Component -->
    <header class="greeting-section">
        <div class="greeting-container">
            <h1 id="greeting-message" class="greeting-message">Good morning</h1>
            <p id="current-time" class="current-time">12:00 PM</p>
            <p id="current-date" class="current-date">Monday, January 1, 2024</p>
        </div>
    </header>

    <!-- Main Dashboard Content -->
    <main class="dashboard-main">
        <!-- Focus Timer Component -->
        <section class="timer-section">
            <h2 class="section-title">Focus Timer</h2>
            <div class="timer-container">
                <div id="timer-display" class="timer-display">25:00</div>
                <div class="timer-controls">
                    <button id="timer-start" class="btn btn-primary">Start</button>
                    <button id="timer-stop" class="btn btn-secondary">Stop</button>
                    <button id="timer-reset" class="btn btn-secondary">Reset</button>
                </div>
            </div>
        </section>

        <!-- Task List Component -->
        <section class="tasks-section">
            <h2 class="section-title">Tasks</h2>
            <div class="task-input-container">
                <input 
                    type="text" 
                    id="task-input" 
                    class="task-input" 
                    placeholder="Add a new task..."
                    aria-label="New task input"
                >
                <button id="task-add-btn" class="btn btn-primary">Add</button>
            </div>
            <ul id="task-list" class="task-list"></ul>
        </section>

        <!-- Quick Links Component -->
        <section class="links-section">
            <h2 class="section-title">Quick Links</h2>
            <div class="link-input-container">
                <input 
                    type="text" 
                    id="link-name-input" 
                    class="link-input" 
                    placeholder="Link name..."
                    aria-label="Link name input"
                >
                <input 
                    type="url" 
                    id="link-url-input" 
                    class="link-input" 
                    placeholder="https://example.com"
                    aria-label="Link URL input"
                >
                <button id="link-add-btn" class="btn btn-primary">Add Link</button>
            </div>
            <div id="links-container" class="links-container"></div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
